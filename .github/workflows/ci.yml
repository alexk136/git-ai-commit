name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Shellcheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          elif command -v brew >/dev/null 2>&1; then
            brew install shellcheck
          else
            echo "::error::no supported package manager found"
            exit 1
          fi
      - name: Run shellcheck
        run: shellcheck -x bin/git-ai-commit lib/*.sh tests/bats/helpers/*.bash

  test:
    name: Bats tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck jq git
            git clone --depth 1 https://github.com/bats-core/bats-core.git
            sudo bats-core/install.sh /usr/local
          elif command -v brew >/dev/null 2>&1; then
            brew install jq git bats-core shellcheck
          else
            echo "::error::no supported package manager found"
            exit 1
          fi
      - name: Run bats
        env:
          NO_COLOR: "1"
        run: bats tests/bats/

  smoke:
    name: Smoke (--help, --install dry-run)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: --help exits 0
        run: bin/git-ai-commit --help
      - name: --tag --dry-run exits 0
        run: |
          git init -q -b main test-repo
          cd test-repo
          git config user.email test@example.com
          git config user.name  Test
          echo a > a && git add a && git commit -qm c
          ../bin/git-ai-commit --tag patch --dry-run